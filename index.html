<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | Google Sheets DB</title>
    <meta name="description" content="A premium form integrated with a Google Sheets database.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <main class="app-container">
        <div class="background-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
        
        <section class="form-wrapper glass-panel">
            <header class="form-header">
                <h1>Get in Touch</h1>
                <p>Fill out the form below, and your data will be securely saved to our Google Sheet database instantly.</p>
            </header>

            <form id="gs-form" class="gs-form">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="4" placeholder="How can we help you?" required></textarea>
                </div>
                
                <button type="submit" id="submit-btn" class="submit-btn">
                    <span class="btn-text">Submit Data</span>
                    <span class="btn-loader loader-hidden"></span>
                </button>
                
                <div id="status-message" class="status-message hidden">
                    <!-- Status message will be injected here via JS -->
                </div>
            </form>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
